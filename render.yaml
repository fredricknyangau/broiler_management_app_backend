services:
  # Python Backend Service
  - type: web
    name: kukufiti-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: kukufiti-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: "Broiler Farm Management API"
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: "/api/v1"
      - key: BACKEND_CORS_ORIGINS
        value: '["https://kukufiti.vercel.app"]'

  # Redis Service
  - type: redis
    name: kukufiti-redis
    region: oregon
    plan: free
    ipAllowList: []